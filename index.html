<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Barbearia Neves — Marcação</title>
  <style>
    :root{
      --bg:#0b0d10;
      --card:#12161c;
      --muted:#aeb6c2;
      --text:#ffffff;
      --line:#2a3240;
      --input:#0f1319;
      --accent:#ffffff;

      --okbg:#0f2a16;
      --okline:#2bd66a;
      --errbg:#2a1010;
      --errline:#ff5c5c;

      --slotFree:#0f1319;
      --slotFreeBorder:#2a3240;
      --slotBusy:#241216;
      --slotBusyBorder:#7a2a3a;
      --slotPick:#1a2230;
      --slotPickBorder:#5e7aa8;
    }

    *{box-sizing:border-box}
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      display:flex;
      justify-content:center;
      padding:22px;
    }

    .wrap{width:100%; max-width:980px;}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:10px;
    }
    .brand img{
      width:64px;height:64px;
      object-fit:contain;
      border-radius:12px;
      background:#fff;
      padding:8px;
    }
    h1{margin:0;font-size:34px}
    p{margin:6px 0 0;color:var(--muted)}

    label{
      display:block;margin-top:14px;
      font-weight:650;color:var(--text);
    }

    input,select,button{
      width:100%;
      padding:12px 12px;
      margin-top:8px;
      font-size:16px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--input);
      color:var(--text);
      outline:none;
    }
    input::placeholder{color:#7f8aa0}
    input:focus,select:focus{
      border-color:#55637d;
      box-shadow:0 0 0 3px rgba(85,99,125,.25);
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      align-items:end;
    }

    button{
      cursor:pointer;
      margin-top:16px;
      background:var(--accent);
      color:#000;
      font-weight:750;
      border:0;
      transition:transform .06s ease;
    }
    button:active{transform:translateY(1px)}
    button:disabled{opacity:.6; cursor:not-allowed}

    .ok,.err{
      padding:12px 12px;
      border-radius:12px;
      margin:12px 0 0;
      display:none;
      white-space:pre-wrap;
    }
    .ok{background:var(--okbg); border:1px solid var(--okline)}
    .err{background:var(--errbg); border:1px solid var(--errline)}

    .grid2{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:16px;
      margin-top:14px;
    }

    .agenda{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:#0e1218;
    }
    .agendaTop{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }
    .agendaTitle{font-weight:750}
    .small{color:var(--muted); font-size:13px}

    .slots{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:10px;
      max-height:420px;
      overflow:auto;
      padding-right:6px;
    }
    .slot{
      border:1px solid var(--slotFreeBorder);
      background:var(--slotFree);
      border-radius:12px;
      padding:10px;
      cursor:pointer;
      user-select:none;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .slot .t{font-weight:800}
    .slot .d{font-size:12px;color:var(--muted)}
    .slot.busy{
      background:var(--slotBusy);
      border-color:var(--slotBusyBorder);
      cursor:not-allowed;
      opacity:.85;
    }
    .slot.pick{
      background:var(--slotPick);
      border-color:var(--slotPickBorder);
      box-shadow:0 0 0 3px rgba(94,122,168,.22);
    }

    .pill{
      display:inline-block;
      padding:4px 8px;
      border:1px solid var(--line);
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
      margin-top:8px;
    }

    @media (max-width: 900px){
      .grid2{grid-template-columns:1fr}
      .row{grid-template-columns:1fr}
      h1{font-size:28px}
      .slots{grid-template-columns: 1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <img src="logo.jpg" alt="Logo Barbearia Neves">
        <div>
          <h1>Barbearia Neves</h1>
          <p>Escolhe um horário livre e confirma. A marcação entra automaticamente na agenda.</p>
          <div class="pill">Horário: 10:00–17:00 • Intervalos: 45 min</div>
        </div>
      </div>

      <div id="ok" class="ok"></div>
      <div id="err" class="err"></div>

      <div class="grid2">
        <div>
          <form id="f" autocomplete="on">
            <label>Nome</label>
            <input name="name" required placeholder="Nome do cliente">

            <div class="row">
              <div>
                <label>Telefone</label>
                <input name="phone" required placeholder="9xx xxx xxx" inputmode="tel">
              </div>
              <div>
                <label>Email (opcional)</label>
                <input name="email" type="email" placeholder="email@exemplo.com">
              </div>
            </div>

            <div class="row">
              <div>
                <label>Serviço</label>
                <select name="service" id="service" required>
                  <option value="Corte">Corte</option>
                  <option value="Barba">Barba</option>
                  <option value="Corte+Barba">Corte+Barba</option>
                </select>
              </div>
              <div>
                <label>Barbeiro</label>
                <select name="barber" id="barber" required>
                  <option value="Pedro">Pedro Neves</option>
                  <option value="Joao">João Leite</option>
                </select>
              </div>
            </div>

            <div class="row">
              <div>
                <label>Data</label>
                <input name="date" id="date" type="date" required>
              </div>
              <!-- ✅ Removido: campo Hora -->
            </div>

            <button id="btn" type="submit">Marcar</button>
          </form>
        </div>

        <div class="agenda">
          <div class="agendaTop">
            <div class="small" id="agendaStatus">A carregar…</div>
          </div>

          <div class="slots" id="slots"></div>

          <div class="small" style="margin-top:10px">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://barbearia-api-ki25.onrender.com";

    // ✅ 10–17:30 e 45min
    const WORK_START = "10:00";
    const WORK_END   = "17:30";
    const STEP_MIN   = 45;
    const FIXED_DUR  = 45;

    const ok = document.getElementById('ok');
    const err = document.getElementById('err');
    const btn = document.getElementById('btn');

    const slotsEl = document.getElementById('slots');
    const agendaStatus = document.getElementById('agendaStatus');

    const dateEl = document.getElementById('date');
    const barberEl = document.getElementById('barber');

    // ✅ substitui o input #time por uma variável interna
    let pickedTime = "";

    function show(el, text) { el.textContent = text; el.style.display = 'block'; }
    function hide(el) { el.style.display = 'none'; }

    function pad2(n){ return (n<10 ? "0":"") + n; }
    function toMin(hhmm){
      const [h,m] = hhmm.split(":").map(Number);
      return h*60+m;
    }
    function toHHMM(min){
      const h = Math.floor(min/60);
      const m = min%60;
      return pad2(h)+":"+pad2(m);
    }
    function overlaps(s1,e1,s2,e2){ return (s1<e2) && (s2<e1); }

    function todayISO(){
      const d = new Date();
      return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate());
    }
    function nowMinutes(){
      const d = new Date();
      return d.getHours()*60 + d.getMinutes();
    }

    function setTodayIfEmpty(){
      if (dateEl.value) return;
      dateEl.value = todayISO();
    }

    async function fetchDay(date, barber){
      const u = new URL(API_BASE + "/day");
      u.searchParams.set("date", date);
      u.searchParams.set("barber", barber);
      const r = await fetch(u.toString());
      const data = await r.json().catch(()=> ({}));
      if (!r.ok) throw new Error(data.error || ("Erro HTTP " + r.status));
      return data.items || [];
    }

    function buildSlots(bookedItems, dur, dateSelected){
      const booked = bookedItems.map(b => {
        const s = toMin(b.time);
        const e = s + (parseInt(b.dur,10) || dur);
        return { ...b, s, e };
      });

      const start = toMin(WORK_START);
      const end   = toMin(WORK_END);

      if (dateSelected < todayISO()) return [];

      const isToday = (dateSelected === todayISO());
      const nowMin = nowMinutes();

      const slots = [];
      for (let t = start; t + dur <= end; t += STEP_MIN){
        if (isToday && t < nowMin) continue;

        const s = t, e = t + dur;

        let busy = null;
        for (const b of booked){
          if (overlaps(s,e,b.s,b.e)){
            busy = b;
            break;
          }
        }

        slots.push({ time: toHHMM(t), busy });
      }
      return slots;
    }

    function escapeHtml(s){
      return (s||"").replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[c]));
    }

    function renderSlots(slots){
      slotsEl.innerHTML = "";
      const picked = pickedTime;

      if (!slots.length){
        slotsEl.innerHTML = `<div class="small">Sem horários disponíveis (ou a data já passou).</div>`;
        return;
      }

      for (const s of slots){
        const div = document.createElement("div");
        div.className = "slot" + (s.busy ? " busy" : "") + (!s.busy && s.time === picked ? " pick" : "");

        if (s.busy){
          const label = s.busy.label || "OCUPADO";
          const reason = (s.busy.notes || s.busy.service || "").trim();

          div.innerHTML = `
            <div class="t">${s.time} — ${escapeHtml(label)}</div>
            <div class="d">${escapeHtml(reason)}</div>
          `;
        } else {
          div.innerHTML = `
            <div class="t">${s.time} — Livre</div>
            <div class="d">Clique para escolher</div>
          `;
          div.addEventListener("click", () => {
            pickedTime = s.time;       // ✅ guarda escolha
            renderSlots(slots.map(x => ({...x}))); // re-render para marcar o pick
          });
        }

        slotsEl.appendChild(div);
      }
    }

    async function refreshAgenda(){
      setTodayIfEmpty();
      agendaStatus.textContent = "A carregar…";

      const date = dateEl.value;
      const barber = barberEl.value;

      // ✅ limpar seleção para obrigar a escolher
      pickedTime = "";

      try{
        const items = await fetchDay(date, barber);
        const slots = buildSlots(items, FIXED_DUR, date);
        renderSlots(slots);
        agendaStatus.textContent = `${items.length} item(s) • ${barber} • ${date}`;
      }catch(ex){
        slotsEl.innerHTML = "";
        agendaStatus.textContent = "Erro a carregar";
        show(err, "❌ Erro ao carregar agenda: " + ex.message);
      }
    }

    dateEl.addEventListener("change", refreshAgenda);
    barberEl.addEventListener("change", refreshAgenda);

    document.getElementById('f').addEventListener('submit', async (e) => {
      e.preventDefault();
      hide(err);
      hide(ok);
      btn.disabled = true;

      // ✅ validação: tem de escolher horário
      if (!pickedTime){
        show(err, "❌ Escolhe um horário livre na agenda.");
        btn.disabled = false;
        return;
      }

      const fd = new FormData(e.target);
      const payload = Object.fromEntries(fd.entries());

      // ✅ hora vem da seleção (não de input)
      payload.time = pickedTime.slice(0,5);

      // fixo 45
      payload.dur = FIXED_DUR;

      // sem notas
      payload.notes = "";

      try {
        const r = await fetch(API_BASE + "/book", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify(payload)
        });
        const data = await r.json().catch(()=> ({}));
        if (!r.ok) throw new Error(data.error || ("Erro HTTP " + r.status));

        show(ok,
          "✅ Marcação confirmada!\n" +
          "ID: " + (data.id || "(sem id)") + "\n" +
          "Data: " + payload.date + "  Hora: " + payload.time + "\n" +
          "Barbeiro: " + payload.barber + "  Serviço: " + payload.service + "\n" +
          "Duração: 45 min"
        );

        const keepName = payload.name;
        const keepPhone = payload.phone;
        const keepEmail = payload.email;

        e.target.reset();
        setTodayIfEmpty();
        document.querySelector('input[name="name"]').value = keepName || "";
        document.querySelector('input[name="phone"]').value = keepPhone || "";
        document.querySelector('input[name="email"]').value = keepEmail || "";

        await refreshAgenda();

      } catch (ex) {
        show(err, "❌ Não foi possível marcar: " + ex.message);
      } finally {
        btn.disabled = false;
      }
    });

    setTodayIfEmpty();
    refreshAgenda();

    // refresca a cada minuto se for hoje
    setInterval(() => {
      if (dateEl.value === todayISO()){
        refreshAgenda();
      }
    }, 60000);
  </script>
</body>
</html>
