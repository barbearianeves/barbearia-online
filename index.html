<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agenda — Barbeiro (Admin)</title>
  <style>
    body{font-family:system-ui,Arial;max-width:980px;margin:24px auto;padding:0 12px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    input,select,button{padding:10px}
    table{width:100%;border-collapse:collapse;margin-top:14px}
    th,td{border-bottom:1px solid #ddd;padding:10px;vertical-align:top;text-align:left}
    small{opacity:.7}
    .danger{background:#ffecec}
  </style>
</head>
<body>
  <h1>Agenda (Barbeiro)</h1>

  <div class="row">
    <input id="token" type="password" placeholder="Senha do barbeiro (ADMIN_TOKEN)" style="min-width:260px">
    <input id="date" type="date">
    <input id="barber" placeholder="Barbeiro (opcional)">
    <button id="load">Carregar</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Hora</th>
        <th>Cliente</th>
        <th>Serviço</th>
        <th>Status</th>
        <th>Notas</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

<script>
  // igual ao da tua bridge:
  const API_BASE = "https://barbearia-api-ki25.onrender.com"; // muda se for diferente

  const tbody = document.getElementById("tbody");
  const tokenEl = document.getElementById("token");

  function token(){ return tokenEl.value.trim(); }

  async function load(){
    const date = document.getElementById("date").value;
    const barber = document.getElementById("barber").value.trim();

    const url = new URL(API_BASE + "/admin/bookings");
    if(date) url.searchParams.set("date", date);
    if(barber) url.searchParams.set("barber", barber);

    const res = await fetch(url, { headers: { "X-Admin-Token": token() }});
    if(!res.ok){
      alert("Sem autorização ou erro. Confirma a senha (ADMIN_TOKEN).");
      return;
    }

    const data = await res.json();
    render(data.items || []);
  }

  function render(items){
    tbody.innerHTML = "";
    items.forEach(b => {
      const tr = document.createElement("tr");
      const st = (b.status || "Marcado").toLowerCase();
      if(st === "cancelado") tr.classList.add("danger");

      tr.innerHTML = `
        <td><b>${b.time||""}</b><br><small>${b.date||""}</small><br><small>id: ${b.id||""}</small></td>
        <td>${b.name||""}<br><small>${b.phone||""}</small><br><small>${b.client||""}</small></td>
        <td>${b.service||""}<br><small>${b.barber||""}</small></td>
        <td>
          <select data-id="${b.id}" class="status">
            ${["Marcado","Confirmado","Concluido","Cancelado"].map(s =>
              `<option value="${s}" ${String(b.status||"")===s?"selected":""}>${s}</option>`
            ).join("")}
          </select>
        </td>
        <td><input data-id="${b.id}" class="notes" value="${escapeHtml(b.notes||"")}" placeholder="Notas..." style="width:240px"></td>
        <td class="row">
          <button data-id="${b.id}" class="save">Guardar</button>
          <button data-id="${b.id}" class="del">Apagar</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  function escapeHtml(s){
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;");
  }

  async function save(id){
    const status = document.querySelector(`.status[data-id="${id}"]`).value;
    const notes  = document.querySelector(`.notes[data-id="${id}"]`).value;

    const res = await fetch(API_BASE + "/admin/bookings/" + id, {
      method: "PATCH",
      headers: {
        "Content-Type":"application/json",
        "X-Admin-Token": token(),
      },
      body: JSON.stringify({ status, notes })
    });

    if(!res.ok){
      alert("Erro ao guardar (ou senha errada).");
      return;
    }
    await load();
  }

  async function del(id){
    if(!confirm("Apagar esta marcação?")) return;

    const res = await fetch(API_BASE + "/admin/bookings/" + id, {
      method: "DELETE",
      headers: { "X-Admin-Token": token() }
    });

    if(!res.ok){
      alert("Erro ao apagar (ou senha errada).");
      return;
    }
    await load();
  }

  document.getElementById("load").addEventListener("click", load);
  document.addEventListener("click", (e) => {
    if(e.target.classList.contains("save")) save(e.target.dataset.id);
    if(e.target.classList.contains("del")) del(e.target.dataset.id);
  });

  // data de hoje por defeito
  document.getElementById("date").valueAsDate = new Date();
</script>

</body>
</html>
