<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Área do Barbeiro</title>

<style>
body{font-family:Arial;max-width:1000px;margin:30px auto;background:#111;color:#fff}
input,select,button{padding:8px;margin:5px}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border-bottom:1px solid #333;padding:10px;text-align:left;vertical-align:top}
button{cursor:pointer}
small{opacity:.75}
hr{border:0;border-top:1px solid #333;margin:14px 0}
h3{margin:10px 5px}
</style>
</head>
<body>

<h2>Agenda do Barbeiro</h2>

<input type="password" id="token" placeholder="Senha do barbeiro (ADMIN_TOKEN)">
<input type="date" id="date">
<button onclick="loadBookings()">Carregar</button>
<small>(Se apagares a data e carregares, mostra tudo)</small>

<hr>

<h3>Bloquear horário (folga / almoço / indisponível)</h3>

<input type="date" id="b_date">
<input type="time" id="b_time" step="1800">
<input type="number" id="b_dur" value="30" min="30" step="30" style="width:120px">
<select id="b_barber" style="width:200px">
  <option value="Pedro">Pedro</option>
  <option value="Joao">Joao</option>
</select>
<input type="text" id="b_notes" placeholder="Motivo (ex: Almoço, Folga)" style="width:260px">
<button onclick="createBlock()">Bloquear</button>

<table>
<thead>
<tr>
<th>Hora</th>
<th>Cliente</th>
<th>Serviço</th>
<th>Barbeiro</th>
<th>Status</th>
<th>Notas</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
const API_BASE = "https://barbearia-api-ki25.onrender.com";

function token(){
  return document.getElementById("token").value.trim();
}

async function loadBookings(){
  const date = document.getElementById("date").value; // pode ser vazio

  const url = date
    ? `${API_BASE}/admin/bookings?date=${encodeURIComponent(date)}`
    : `${API_BASE}/admin/bookings`;

  const res = await fetch(url, {
    headers: { "X-Admin-Token": token() }
  });

  if(!res.ok){
    const txt = await res.text();
    alert("Erro: " + res.status + " - " + txt);
    return;
  }

  const data = await res.json();
  render(data.items || []);
}

function render(items){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  if(!items.length){
    const tr = document.createElement("tr");
    tr.innerHTML = `<td colspan="7"><small>Sem marcações para o filtro atual.</small></td>`;
    tbody.appendChild(tr);
    return;
  }

  items.forEach(b => {
    const tr = document.createElement("tr");

    const isBlock = (b.status === "Bloqueado") || (b.service === "INDISPONIVEL");
    const cliente = isBlock ? "<b>INDISPONÍVEL</b>" : (b.name || b.client || "");
    const servico = isBlock ? "<b>INDISPONÍVEL</b>" : (b.service || "");
    const notas = (b.notes || "").replaceAll('"', "&quot;");

    tr.innerHTML = `
      <td><b>${b.time || ""}</b><br><small>${b.date || ""}</small></td>
      <td>${cliente}</td>
      <td>${servico}</td>
      <td>${b.barber || ""}</td>
      <td>
        <select onchange="updateStatus('${b.id}', this.value)">
          ${["Marcado","Confirmado","Concluido","Cancelado","Bloqueado"].map(s =>
            `<option value="${s}" ${(b.status||"Marcado")===s?"selected":""}>${s}</option>`
          ).join("")}
        </select>
      </td>
      <td>
        <input value="${notas}" style="width:200px"
               placeholder="Notas..." onchange="updateNotes('${b.id}', this.value)">
      </td>
      <td>
        <button onclick="deleteBooking('${b.id}')">Apagar</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

async function updateStatus(id, status){
  const res = await fetch(`${API_BASE}/admin/bookings/${id}`, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      "X-Admin-Token": token()
    },
    body: JSON.stringify({ status })
  });

  if(!res.ok){
    const txt = await res.text();
    alert("Erro ao atualizar status: " + res.status + " - " + txt);
    return;
  }

  loadBookings();
}

async function updateNotes(id, notes){
  const res = await fetch(`${API_BASE}/admin/bookings/${id}`, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      "X-Admin-Token": token()
    },
    body: JSON.stringify({ notes })
  });

  if(!res.ok){
    const txt = await res.text();
    alert("Erro ao atualizar notas: " + res.status + " - " + txt);
    return;
  }
}

async function deleteBooking(id){
  if(!confirm("Apagar?")) return;

  const res = await fetch(`${API_BASE}/admin/bookings/${id}`, {
    method: "DELETE",
    headers: { "X-Admin-Token": token() }
  });

  if(!res.ok){
    const txt = await res.text();
    alert("Erro ao apagar: " + res.status + " - " + txt);
    return;
  }

  loadBookings();
}

// ✅ Criar bloqueio
async function createBlock(){
  const date = document.getElementById("b_date").value;
  const time = document.getElementById("b_time").value;
  const dur = parseInt(document.getElementById("b_dur").value, 10) || 30;
  const barber = document.getElementById("b_barber").value.trim();
  const notes = document.getElementById("b_notes").value.trim();

  if(!date || !time || !barber){
    alert("Preenche data, hora e barbeiro.");
    return;
  }

  const res = await fetch(`${API_BASE}/admin/block`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-Admin-Token": token()
    },
    body: JSON.stringify({ date, time: time.slice(0,5), dur, barber, notes })
  });

  if(!res.ok){
    const txt = await res.text();
    alert("Erro a bloquear: " + res.status + " - " + txt);
    return;
  }

  alert("✅ Horário bloqueado!");
  loadBookings();
}

// defaults
document.getElementById("date").valueAsDate = new Date();
document.getElementById("b_date").valueAsDate = new Date();
</script>

</body>
</html>
